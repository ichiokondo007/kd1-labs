services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: kd1-server
    restart: "no"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      SESSION_SECRET: ${SESSION_SECRET:-kd1-dev-secret}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-kd1}
      DB_PASSWORD: ${DB_PASSWORD:-kd1}
      DB_NAME: ${DB_NAME:-kd1}
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USER: ${MONGO_USER:-kd1}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-kd1}
      MONGO_DATABASE: ${MONGO_DATABASE:-kd1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-kd1admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-kd1admin1234}
      MINIO_BUCKET: ${MINIO_BUCKET:-public}
      MINIO_PUBLIC_URL_BASE: ${MINIO_PUBLIC_URL_BASE:-http://localhost:9000}
    ports:
      - "3000:3000"
    networks:
      - kd1-network
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: kd1-client
    restart: "no"
    ports:
      - "8080:80"
    networks:
      - kd1-network
    depends_on:
      - server

networks:
  kd1-network:
    name: kd1-network
